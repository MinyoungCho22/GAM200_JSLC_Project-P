<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project P</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none !important;
    }
    /* 기본 스타일만 설정. 위치/크기는 JS가 !important로 직접 적용 */
    #canvas {
      cursor: none !important;
      image-rendering: pixelated;
      border: 0 !important;
      outline: none !important;
      box-shadow: none !important;
      -webkit-tap-highlight-color: transparent;
    }
    #canvas:focus,
    #canvas:focus-visible,
    #canvas:active {
      border: 0 !important;
      outline: none !important;
      box-shadow: none !important;
    }
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 18px;
      z-index: 10;
    }
    #loading.hidden { display: none; }
    #progress-bar {
      width: 300px; height: 6px;
      background: #333;
      border-radius: 3px;
      margin-top: 16px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: #fff;
      width: 0%;
      transition: width 0.2s;
    }
    #fullscreen-btn {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 6px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-family: sans-serif;
      font-size: 14px;
      cursor: pointer !important;
      user-select: none;
    }
    #fullscreen-btn:hover {
      background: rgba(40,40,40,0.8);
    }
  </style>
</head>
<body>
  <div id="loading">
    <div id="status-text">Loading...</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <button id="fullscreen-btn" type="button">Fullscreen</button>

  <script>
    var statusEl  = document.getElementById('status-text');
    var fillEl    = document.getElementById('progress-fill');
    var loadingEl = document.getElementById('loading');
    var fullscreenBtn = document.getElementById('fullscreen-btn');

    var GAME_W = 1280, GAME_H = 720;
    window.gameSystemCursorVisible = false;
    window.gameMainMenuActive = false;
    window.gameCreditsActive = false;
    window.gameSettingsActive = false;
    window.gameWasFullscreen = false;
    window.gameSetSystemCursorVisible = function(visible) {
      window.gameSystemCursorVisible = !!visible;
      fitCanvas();
      var cursor = window.gameSystemCursorVisible ? 'default' : 'none';
      document.documentElement.style.setProperty('cursor', cursor, 'important');
      document.body.style.setProperty('cursor', cursor, 'important');
    };

    // canvas에 position:fixed + 정확한 픽셀 좌표를 !important로 강제 적용.
    // GLFW(contrib.glfw3)가 canvas.style을 덮어써도 MutationObserver가
    // 다음 프레임에 복원한다.
    function fitCanvas() {
      var canvas = document.getElementById('canvas');
      if (!canvas) return;

      var vw = window.innerWidth;
      var vh = window.innerHeight;

      // 16:9 유지, 내용이 절대 잘리지 않는 최대 scale
      var scale = Math.min(vw / GAME_W, vh / GAME_H);
      var dw = Math.round(GAME_W * scale);
      var dh = Math.round(GAME_H * scale);
      var left = Math.round((vw - dw) / 2);   // 좌우 필러박스
      var top  = Math.round((vh - dh) / 2);   // 상하 레터박스

      var s = canvas.style;
      s.setProperty('position', 'fixed',       'important');
      s.setProperty('left',     left + 'px',   'important');
      s.setProperty('top',      top  + 'px',   'important');
      s.setProperty('width',    dw   + 'px',   'important');
      s.setProperty('height',   dh   + 'px',   'important');
      s.setProperty('cursor',   window.gameSystemCursorVisible ? 'default' : 'none', 'important');
      // transform 없음: canvas.width(버퍼)와 CSS width 비율로
      // GLFW getBoundingClientRect()가 마우스 좌표를 정확히 스케일함
    }

    window.addEventListener('resize', fitCanvas);
    document.addEventListener('DOMContentLoaded', fitCanvas);

    function updateFullscreenButton() {
      if (!fullscreenBtn) return;
      fullscreenBtn.textContent = document.fullscreenElement ? 'Exit Fullscreen' : 'Fullscreen';
    }

    function tryLockFullscreenEscape() {
      if (navigator.keyboard && navigator.keyboard.lock) {
        navigator.keyboard.lock(['Escape']).catch(function() {});
      }
    }

    function unlockFullscreenEscape() {
      if (navigator.keyboard && navigator.keyboard.unlock) {
        navigator.keyboard.unlock();
      }
    }

    function exitFullscreen() {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }

    function synthesizeEscapeForGame() {
      var target = document.getElementById('canvas') || window;
      var down = new KeyboardEvent('keydown', { key: 'Escape', code: 'Escape', keyCode: 27, which: 27, bubbles: true });
      var up = new KeyboardEvent('keyup', { key: 'Escape', code: 'Escape', keyCode: 27, which: 27, bubbles: true });
      target.dispatchEvent(down);
      window.dispatchEvent(down);
      setTimeout(function() {
        target.dispatchEvent(up);
        window.dispatchEvent(up);
      }, 80);
    }

    function handleFullscreenStateChanged() {
      var isFullscreen = !!document.fullscreenElement || !!document.webkitFullscreenElement;
      updateFullscreenButton();
      fitCanvas();
      if (isFullscreen)
        tryLockFullscreenEscape();
      else
        unlockFullscreenEscape();
      if (!isFullscreen && window.gameWasFullscreen && (window.gameCreditsActive || window.gameSettingsActive))
        synthesizeEscapeForGame();
      window.gameWasFullscreen = isFullscreen;
    }

    window.addEventListener('keydown', function(e) {
      if ((e.key === 'Escape' || e.code === 'Escape') && window.gameMainMenuActive
          && !window.gameCreditsActive
          && !window.gameSettingsActive
          && (document.fullscreenElement || document.webkitFullscreenElement)) {
        e.preventDefault();
        e.stopImmediatePropagation();
        exitFullscreen();
      }
    }, true);

    if (fullscreenBtn) {
      fullscreenBtn.addEventListener('click', function() {
        if (document.fullscreenElement) {
          exitFullscreen();
          return;
        }
        var target = document.documentElement;
        if (target.requestFullscreen) {
          target.requestFullscreen().then(tryLockFullscreenEscape).catch(function() {});
        } else if (target.webkitRequestFullscreen) {
          target.webkitRequestFullscreen();
          setTimeout(tryLockFullscreenEscape, 0);
        }
      });
    }
    document.addEventListener('fullscreenchange', function() {
      handleFullscreenStateChanged();
    });
    document.addEventListener('webkitfullscreenchange', function() {
      handleFullscreenStateChanged();
    });

    // GLFW가 canvas.style을 변경하면 다음 프레임에 복원
    var _fitPending = false;
    document.addEventListener('DOMContentLoaded', function() {
      var canvas = document.getElementById('canvas');
      if (!canvas) return;
      fitCanvas();
      new MutationObserver(function() {
        if (_fitPending) return;
        _fitPending = true;
        requestAnimationFrame(function() {
          _fitPending = false;
          fitCanvas();
        });
      }).observe(canvas, { attributes: true, attributeFilter: ['style'] });
    });

    // body cursor 복원
    new MutationObserver(function(muts) {
      muts.forEach(function(m) {
        var el = m.target;
        var cursor = window.gameSystemCursorVisible ? 'default' : 'none';
        if (el.style.cursor && el.style.cursor !== cursor)
          el.style.setProperty('cursor', cursor, 'important');
      });
    }).observe(document.body, { attributes: true, attributeFilter: ['style'] });

    // ── Emscripten Module ─────────────────────────────────────────────────
    var Module = {
      canvas: document.getElementById('canvas'),
      setStatus: function(text) {
        if (!text) { loadingEl.classList.add('hidden'); return; }
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        if (m) {
          statusEl.textContent = m[1].trim();
          fillEl.style.width = (100 * parseInt(m[2]) / parseInt(m[4])) + '%';
        } else {
          statusEl.textContent = text;
        }
      },
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : '');
      },
      print: function() {},
      printErr: function(text) { console.error(text); }
    };

    window.onerror = function(msg) {
      statusEl.textContent = 'Error: ' + msg;
      loadingEl.classList.remove('hidden');
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
