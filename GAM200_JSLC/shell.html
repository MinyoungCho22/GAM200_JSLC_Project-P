<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project P</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none !important;
    }
    /* кё°ліё мҠӨнғҖмқјл§Ң м„Өм •. мң„м№ҳ/нҒ¬кё°лҠ” JSк°Җ !importantлЎң м§Ғм ‘ м Ғмҡ© */
    #canvas {
      cursor: none !important;
      image-rendering: pixelated;
      border: 0 !important;
      outline: none !important;
      box-shadow: none !important;
      -webkit-tap-highlight-color: transparent;
    }
    #canvas:focus,
    #canvas:focus-visible,
    #canvas:active {
      border: 0 !important;
      outline: none !important;
      box-shadow: none !important;
    }
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 18px;
      z-index: 10;
    }
    #loading.hidden { display: none; }
    #progress-bar {
      width: 300px; height: 6px;
      background: #333;
      border-radius: 3px;
      margin-top: 16px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: #fff;
      width: 0%;
      transition: width 0.2s;
    }
    #fullscreen-btn {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 6px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-family: sans-serif;
      font-size: 14px;
      cursor: pointer !important;
      user-select: none;
    }
    #fullscreen-btn:hover {
      background: rgba(40,40,40,0.8);
    }
  </style>
</head>
<body>
  <div id="loading">
    <div id="status-text">Loading...</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  <button id="fullscreen-btn" type="button">Fullscreen</button>

  <script>
    var statusEl  = document.getElementById('status-text');
    var fillEl    = document.getElementById('progress-fill');
    var loadingEl = document.getElementById('loading');
    var fullscreenBtn = document.getElementById('fullscreen-btn');

    var GAME_W = 1280, GAME_H = 720;
    window.gameSystemCursorVisible = false;
    window.gameSetSystemCursorVisible = function(visible) {
      window.gameSystemCursorVisible = !!visible;
      fitCanvas();
      var cursor = window.gameSystemCursorVisible ? 'default' : 'none';
      document.documentElement.style.setProperty('cursor', cursor, 'important');
      document.body.style.setProperty('cursor', cursor, 'important');
    };

    // canvasм—җ position:fixed + м •нҷ•н•ң н”Ҫм…Җ мўҢн‘ңлҘј !importantлЎң к°•м ң м Ғмҡ©.
    // GLFW(contrib.glfw3)к°Җ canvas.styleмқ„ лҚ®м–ҙмҚЁлҸ„ MutationObserverк°Җ
    // лӢӨмқҢ н”„л Ҳмһ„м—җ ліөмӣҗн•ңлӢӨ.
    function fitCanvas() {
      var canvas = document.getElementById('canvas');
      if (!canvas) return;

      var vw = window.innerWidth;
      var vh = window.innerHeight;

      // 16:9 мң м§Җ, лӮҙмҡ©мқҙ м ҲлҢҖ мһҳлҰ¬м§Җ м•ҠлҠ” мөңлҢҖ scale
      var scale = Math.min(vw / GAME_W, vh / GAME_H);
      var dw = Math.round(GAME_W * scale);
      var dh = Math.round(GAME_H * scale);
      var left = Math.round((vw - dw) / 2);   // мўҢмҡ° н•„лҹ¬л°•мҠӨ
      var top  = Math.round((vh - dh) / 2);   // мғҒн•ҳ л Ҳн„°л°•мҠӨ

      var s = canvas.style;
      s.setProperty('position', 'fixed',       'important');
      s.setProperty('left',     left + 'px',   'important');
      s.setProperty('top',      top  + 'px',   'important');
      s.setProperty('width',    dw   + 'px',   'important');
      s.setProperty('height',   dh   + 'px',   'important');
      s.setProperty('cursor',   window.gameSystemCursorVisible ? 'default' : 'none', 'important');
      // transform м—ҶмқҢ: canvas.width(лІ„нҚј)мҷҖ CSS width л№„мңЁлЎң
      // GLFW getBoundingClientRect()к°Җ л§Ҳмҡ°мҠӨ мўҢн‘ңлҘј м •нҷ•нһҲ мҠӨмјҖмқјн•Ё
    }

    window.addEventListener('resize', fitCanvas);
    document.addEventListener('DOMContentLoaded', fitCanvas);

    function updateFullscreenButton() {
      if (!fullscreenBtn) return;
      fullscreenBtn.textContent = document.fullscreenElement ? 'Exit Fullscreen' : 'Fullscreen';
    }

    if (fullscreenBtn) {
      fullscreenBtn.addEventListener('click', function() {
        if (document.fullscreenElement) {
          if (document.exitFullscreen) document.exitFullscreen();
          return;
        }
        var target = document.documentElement;
        if (target.requestFullscreen) target.requestFullscreen();
        else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
      });
    }
    document.addEventListener('fullscreenchange', function() {
      updateFullscreenButton();
      fitCanvas();
    });
    document.addEventListener('webkitfullscreenchange', function() {
      updateFullscreenButton();
      fitCanvas();
    });

    // GLFWк°Җ canvas.styleмқ„ ліҖкІҪн•ҳл©ҙ лӢӨмқҢ н”„л Ҳмһ„м—җ ліөмӣҗ
    var _fitPending = false;
    document.addEventListener('DOMContentLoaded', function() {
      var canvas = document.getElementById('canvas');
      if (!canvas) return;
      fitCanvas();
      new MutationObserver(function() {
        if (_fitPending) return;
        _fitPending = true;
        requestAnimationFrame(function() {
          _fitPending = false;
          fitCanvas();
        });
      }).observe(canvas, { attributes: true, attributeFilter: ['style'] });
    });

    // body cursor ліөмӣҗ
    new MutationObserver(function(muts) {
      muts.forEach(function(m) {
        var el = m.target;
        var cursor = window.gameSystemCursorVisible ? 'default' : 'none';
        if (el.style.cursor && el.style.cursor !== cursor)
          el.style.setProperty('cursor', cursor, 'important');
      });
    }).observe(document.body, { attributes: true, attributeFilter: ['style'] });

    // в”Җв”Җ Emscripten Module в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    var Module = {
      canvas: document.getElementById('canvas'),
      setStatus: function(text) {
        if (!text) { loadingEl.classList.add('hidden'); return; }
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        if (m) {
          statusEl.textContent = m[1].trim();
          fillEl.style.width = (100 * parseInt(m[2]) / parseInt(m[4])) + '%';
        } else {
          statusEl.textContent = text;
        }
      },
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : '');
      },
      print: function() {},
      printErr: function(text) { console.error(text); }
    };

    window.onerror = function(msg) {
      statusEl.textContent = 'Error: ' + msg;
      loadingEl.classList.remove('hidden');
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
