<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project P</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      cursor: none !important;
    }
    /* 기본 스타일만 설정. 위치/크기는 JS가 !important로 직접 적용 */
    #canvas {
      cursor: none !important;
      image-rendering: pixelated;
      border: 0 !important;
      outline: none !important;
      box-shadow: none !important;
      -webkit-tap-highlight-color: transparent;
    }
    #canvas:focus,
    #canvas:focus-visible,
    #canvas:active {
      border: 0 !important;
      outline: none !important;
      box-shadow: none !important;
    }
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 18px;
      z-index: 10;
    }
    #loading.hidden { display: none; }
    #progress-bar {
      width: 300px; height: 6px;
      background: #333;
      border-radius: 3px;
      margin-top: 16px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: #fff;
      width: 0%;
      transition: width 0.2s;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div id="status-text">Loading...</div>
    <div id="progress-bar"><div id="progress-fill"></div></div>
  </div>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <script>
    var statusEl  = document.getElementById('status-text');
    var fillEl    = document.getElementById('progress-fill');
    var loadingEl = document.getElementById('loading');

    var GAME_W = 1280, GAME_H = 720;

    // canvas에 position:fixed + 정확한 픽셀 좌표를 !important로 강제 적용.
    // GLFW(contrib.glfw3)가 canvas.style을 덮어써도 MutationObserver가
    // 다음 프레임에 복원한다.
    function fitCanvas() {
      var canvas = document.getElementById('canvas');
      if (!canvas) return;

      var vw = window.innerWidth;
      var vh = window.innerHeight;

      // 16:9 유지, 내용이 절대 잘리지 않는 최대 scale
      var scale = Math.min(vw / GAME_W, vh / GAME_H);
      var dw = Math.round(GAME_W * scale);
      var dh = Math.round(GAME_H * scale);
      var left = Math.round((vw - dw) / 2);   // 좌우 필러박스
      var top  = Math.round((vh - dh) / 2);   // 상하 레터박스

      var s = canvas.style;
      s.setProperty('position', 'fixed',       'important');
      s.setProperty('left',     left + 'px',   'important');
      s.setProperty('top',      top  + 'px',   'important');
      s.setProperty('width',    dw   + 'px',   'important');
      s.setProperty('height',   dh   + 'px',   'important');
      s.setProperty('cursor',   'none',         'important');
      // transform 없음: canvas.width(버퍼)와 CSS width 비율로
      // GLFW getBoundingClientRect()가 마우스 좌표를 정확히 스케일함
    }

    window.addEventListener('resize', fitCanvas);
    document.addEventListener('DOMContentLoaded', fitCanvas);

    // GLFW가 canvas.style을 변경하면 다음 프레임에 복원
    var _fitPending = false;
    document.addEventListener('DOMContentLoaded', function() {
      var canvas = document.getElementById('canvas');
      if (!canvas) return;
      fitCanvas();
      new MutationObserver(function() {
        if (_fitPending) return;
        _fitPending = true;
        requestAnimationFrame(function() {
          _fitPending = false;
          fitCanvas();
        });
      }).observe(canvas, { attributes: true, attributeFilter: ['style'] });
    });

    // body cursor 복원
    new MutationObserver(function(muts) {
      muts.forEach(function(m) {
        var el = m.target;
        if (el.style.cursor && el.style.cursor !== 'none')
          el.style.setProperty('cursor', 'none', 'important');
      });
    }).observe(document.body, { attributes: true, attributeFilter: ['style'] });

    // ── Emscripten Module ─────────────────────────────────────────────────
    var Module = {
      canvas: document.getElementById('canvas'),
      setStatus: function(text) {
        if (!text) { loadingEl.classList.add('hidden'); return; }
        var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
        if (m) {
          statusEl.textContent = m[1].trim();
          fillEl.style.width = (100 * parseInt(m[2]) / parseInt(m[4])) + '%';
        } else {
          statusEl.textContent = text;
        }
      },
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : '');
      },
      print: function() {},
      printErr: function(text) { console.error(text); }
    };

    window.onerror = function(msg) {
      statusEl.textContent = 'Error: ' + msg;
      loadingEl.classList.remove('hidden');
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
